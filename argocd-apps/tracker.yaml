apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tracker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AmanHogan/k3s-data-platform.git
    targetRevision: master
    path: manifests/tracker
  destination:
    server: https://kubernetes.default.svc
    namespace: tracker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
