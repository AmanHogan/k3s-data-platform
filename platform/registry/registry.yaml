# In-cluster Docker registry (registry:2) for the k3s data platform.
# Stores images built by Jenkins; pulled by k3s when deploying.
# Exposed via MetalLB on a pinned IP so both VMs can hardcode it in
# /etc/rancher/k3s/registries.yaml.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: cicd
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: cicd
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: cicd
  labels:
    app: registry
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.245
  selector:
    app: registry
  ports:
    - name: registry
      port: 5001
      targetPort: 5000
      protocol: TCP
