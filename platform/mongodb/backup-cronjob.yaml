# Daily MongoDB backups via `mongodump`.
#
# Design choices:
#  - Writes a single gzipped archive per run to a dedicated `mongodb-backups` PVC.
#  - Keeps the most recent 7 archives, prunes older ones.
#  - The Job pod is pinned to the k3s-server node (nodeSelector), so its local-path
#    backup volume lands on a DIFFERENT physical node than the live data (which is
#    on k3s-agent). That means a single node's disk failure can't destroy both the
#    database and its backups at once.
#
# Restore (manual): copy an archive out and run, e.g.:
#   kubectl exec -it deploy/mongodb -n commitments -- sh -c \
#     'mongorestore --gzip --archive=/path/to/archive --drop'
# (You'd first get the archive into the mongodb pod, or run mongorestore from a
#  throwaway pod that mounts the backups PVC and points --host at the service.)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-backups
  namespace: commitments
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
  namespace: commitments
spec:
  schedule: "0 3 * * *" # 03:00 daily
  timeZone: "America/Chicago"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Clean up finished backup Jobs after a day so they don't pile up.
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          # Pin to the OTHER node so backups don't share a disk with the live data.
          nodeSelector:
            kubernetes.io/hostname: k3s-server
          containers:
            - name: mongodump
              # Same major version as the server (4.4) so the dump tooling matches.
              image: mongo:4.4
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TS=$(date +%Y%m%d-%H%M%S)
                  echo "Starting backup commitments-${TS}..."
                  mongodump \
                    --host=mongodb.commitments.svc.cluster.local \
                    --port=27017 \
                    --gzip \
                    --archive=/backups/commitments-${TS}.archive.gz
                  echo "Backup written. Pruning to the latest 7..."
                  ls -1t /backups/commitments-*.archive.gz | tail -n +8 | xargs -r rm -f
                  echo "Current backups:"
                  ls -lh /backups/
              volumeMounts:
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: mongodb-backups
