# ⚠️  THIS PVC HOLDS YOUR LIVE MONGODB DATA. ⚠️
#
# It is deliberately kept in its OWN file, separate from the Deployment/Service,
# so that a `kubectl delete -f mongodb.yaml` can never delete the data along with
# the workload. Only ever delete this PVC if you truly mean to destroy the data.
#
# The bound PV's reclaim policy has been patched to `Retain` (see README/setup-log),
# so even deleting this PVC leaves the underlying data on disk for manual recovery.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data
  namespace: commitments
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
