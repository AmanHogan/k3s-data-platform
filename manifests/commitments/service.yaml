apiVersion: v1
kind: Service
metadata:
  name: commitments
  namespace: commitments
  labels:
    app: commitments
spec:
  # ClusterIP — Cloudflare Tunnel reaches this via in-cluster DNS:
  #   commitments.commitments.svc.cluster.local:3000
  # No public LoadBalancer or NodePort needed.
  type: ClusterIP
  selector:
    app: commitments
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
