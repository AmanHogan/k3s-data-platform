apiVersion: v1
kind: Service
metadata:
  name: c4-diagram
  namespace: c4-diagram
  labels:
    app: c4-diagram
spec:
  # ClusterIP — Cloudflare Tunnel reaches this via in-cluster DNS:
  #   c4-diagram.c4-diagram.svc.cluster.local:3000
  # No public LoadBalancer or NodePort needed.
  type: ClusterIP
  selector:
    app: c4-diagram
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
