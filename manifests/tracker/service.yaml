# Internal DNS path: tracker.tracker.svc.cluster.local:3000
apiVersion: v1
kind: Service
metadata:
  name: tracker
  namespace: tracker
  labels:
    app: tracker
spec:
  type: ClusterIP
  selector:
    app: tracker
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
